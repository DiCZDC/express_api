<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Artículos</title>
<link rel="stylesheet" href="/estilos.css">
</head>
<body>
<script src="/nav.js"></script>
<h1>Artículos</h1>
<form id="form">
  <input name="nombre" placeholder="Nombre" required>
  <input name="precio" type="number" step="0.01" placeholder="Precio" required>
  <input name="stock" type="number" placeholder="Stock" required>
  <button type="submit">Agregar</button>
</form>
<table>
  <thead><tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th></th></tr></thead>
  <tbody id="lista"></tbody>
</table>
<p class="mensaje" id="mensaje"></p>

<script>
const headers = () => ({
  'Content-Type': 'application/json',
  'Authorization': 'Bearer ' + localStorage.getItem('token')
});

async function cargar() {
  const res = await fetch('/articulos', { headers: headers() });
  if (!res.ok) {
    document.getElementById('mensaje').textContent = 'Inicia sesión para ver los artículos';
    return;
  }
  const items = await res.json();
  document.getElementById('lista').innerHTML = items.map(a => `
    <tr>
      <td>${a._id}</td>
      <td>${a.nombre}</td>
      <td>${a.precio}</td>
      <td>${a.stock}</td>
      <td><button onclick="eliminar(${a._id})">Eliminar</button></td>
    </tr>
  `).join('');
}

async function eliminar(id) {
  await fetch('/articulos/' + id, { method: 'DELETE', headers: headers() });
  cargar();
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const datos = Object.fromEntries(new FormData(e.target));
  const res = await fetch('/articulos', { method: 'POST', headers: headers(), body: JSON.stringify(datos) });
  if (res.ok) { e.target.reset(); cargar(); }
  else document.getElementById('mensaje').textContent = 'Error al agregar el artículo';
});

cargar();
</script>
</body>
</html>
